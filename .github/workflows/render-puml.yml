name: Generate PlantUML SVGs

on:
  push:
    paths:
      - 'docs/diagrams/**/*.puml'

jobs:
  render:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate SVG files
        run: |
          bash scripts/render-puml.sh

      - name: Commit generated SVGs (if changed)
        run: |
          git config --local user.name "teamdev-bot"
          git config --local user.email "ci@teamdev-2026.local"

          git add docs/generated-diagrams/**/*.svg

          if git diff --cached --quiet; then
            echo "No diagram updates."
          else
            git commit -m "chore(diagrams): auto-generate SVGs"
            git push
          fi