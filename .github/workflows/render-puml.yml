name: Generate PlantUML SVGs

on:
  push:
    paths:
      - 'diagrams/**/*.puml'

jobs:
  render:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Download PlantUML
        run: |
          curl -L -o plantuml.jar \
            https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar

      - name: Generate SVG files
        run: |
          mkdir -p generated-diagrams
          java -jar plantuml.jar \
            -tsvg diagrams/*.puml \
            -o ../generated-diagrams

      - name: Commit generated SVGs (if changed)
        run: |
          git config --local user.name "teamdev-bot"
          git config --local user.email "ci@teamdev-2026.local"

          git add generated-diagrams/*.svg

          if git diff --cached --quiet; then
            echo "No diagram updates."
          else
            git commit -m "chore(diagrams): auto-generate SVGs"
            git push
          fi