tyle="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="1337.5" y="227.0669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.7915" x="1337.5" y="242.1997">- Member must be unique within a Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.9307" x="1337.5" y="257.3325">- MemberStatus determines survey eligibility.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.9531" x="1337.5" y="272.4653">- TeamMember permission role is `manager` or `member`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="347.8643" x="1337.5" y="287.5981">- RoleDefinition name must be unique within a Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.6836" x="1337.5" y="302.731">- Inactive RoleDefinition cannot be newly assigned.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="391.9995" x="1337.5" y="317.8638">- Team keeps a default condition window (7/14/30/90 days).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="359.5186" x="1337.5" y="332.9966">- Cannot remove last active manager if policy requires.</text></g><!--reverse link Team to TeamMember--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="73" id="lnk11"><path codeLine="73" d="M313.1061,443.4204 C293.8361,466.7404 282.28,480.73 264.89,501.77" fill="none" id="Team-backto-TeamMember" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="320.75,434.17,313.8446,436.2473,313.1061,443.4204,320.0115,441.3432,320.75,434.17" style="stroke:#181818;stroke-width:1;"/><text fil