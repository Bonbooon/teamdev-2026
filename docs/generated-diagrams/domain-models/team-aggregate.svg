292">archived</text><line style="stroke:#181818;stroke-width:0.5;" x1="23" x2="136.9932" y1="543.5938" y2="543.5938"/></g><!--class MembershipStatus--><g class="entity" data-qualified-name="Team Aggregate.MembershipStatus" data-source-line="68" id="ent0010"><rect fill="#F1F1F1" height="80.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="163.1406" x="173.5" y="471"/><ellipse cx="188.5" cy="487" fill="#EB937F" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M192.6094,493 L184.8906,493 L184.8906,480.6094 L192.6094,480.6094 L192.6094,482.7656 L187.3438,482.7656 L187.3438,485.4375 L192.1094,485.4375 L192.1094,487.5938 L187.3438,487.5938 L187.3438,490.8438 L192.6094,490.8438 L192.6094,493 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.1406" x="202.5" y="491.8467">MembershipStatus</text><line style="stroke:#181818;stroke-width:0.5;" x1="174.5" x2="335.6406" y1="503" y2="503"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="42.5537" x="179.5" y="519.9951">active</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55.3164" x="179.5" y="536.292">inactive</text><line style="stroke:#181818;stroke-width:0.5;" x1="174.5" x2="335.6406" y1="543.5938" y2="543.5938"/></g><g class="entity" data-qualified-name="GMN14" data-source-line="79" id="ent0015"><path d="M1330.5,134 L1330.5,195.5 L1255.7,199.5 L1330.5,203.5 L1330.5,265.0625 A0,0 0 0 0 1330.5,265.0625 L1743.4995,265.0625 A0,0 0 0 0 1743.4995,265.0625 L1743.4995,144 L1733.4995,134 L1330.5,134 A0,0 0 0 0 1330.5,134" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1733.4995,134 L1733.4995,144 L1743.4995,144 L1733.4995,134" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="1336.5" y="151.0669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.7915" x="1336.5" y="166.1997">- Member must be unique within a Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.9307" x="1336.5" y="181.3325">- MemberStatus determines survey eligibility.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.9531" x="1336.5" y="196.4653">- TeamMember permission role is `manager` or `member`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="347.8643" x="1336.5" y="211.5981">- RoleDefinition name must be unique within a Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.6836" x="1336.5" y="226.731">- Inactive RoleDefinition cannot be newly assigned.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="391.9995" x="1336.5" y="241.8638">- Team keeps a default condition window (7/14/30/90 days).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="359.5186" x="1336.5" y="256.9966">- Cannot remove last active manager if policy requires.</text></g><g class="entity" data-qualified-name="N1" data-source-line="90" id="ent0017"><path d="M1779,164 L1779,234.5313 L2187.4736,234.5313 L2187.4736,174 L2177.4736,164 L1779,164" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2177.4736,164 L2177.4736,174 L2187.4736,174 L2177.4736,164" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.2334" x="1785" y="181.0669">Inter-Aggregate Communication:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.4736" x="1785" y="196.1997">TeamInvitation (separate aggregate) creates TeamMember</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="347.0898" x="1785" y="211.3325">when accepted. This preserves distinct lifecycles and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.2207" x="1785" y="226.4653">transaction boundaries per DDD.</text></g><!--reverse link Team to TeamMember--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="73" id="lnk11"><path codeLine="73" d="M713.2267,366.0385 C685.8767,389.5285 667.73,405.11 643.09,426.27" fill="none" id="Team-backto-TeamMember" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="722.33,358.22,715.1722,359.0948,713.2267,366.0385,720.3845,365.1637,722.33,358.22" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="705.2367" y="378.341">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="627.5466" y="415.3588">0..*</text></g><!--reverse link Team to RoleDefinition--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="74" id="lnk12"><path codeLine="74" d="M871.0145,369.9723 C866.8145,390.3223 865.05,398.85 861.17,417.66" fill="none" id="Team-backto-RoleDefinition" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="873.44,358.22,868.3098,363.2876,871.0145,369.9723,876.1447,364.9047,873.44,358.22" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="863.6661" y="378.341">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="838.7738" y="406.9869">0..*</text></g><!--reverse link Team to TeamConditionSetting--><g