e="13" lengthAdjust="spacing" textLength="91.0063" x="1297.48" y="227.5684">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.7422" x="1297.48" y="242.8789">- Member must be unique within a Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.1997" x="1297.48" y="258.1895">- MemberStatus determines survey eligibility.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="383.6587" x="1297.48" y="273.5">- TeamMember permission role is `manager` or `member`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="339.3838" x="1297.48" y="288.8105">- RoleDefinition name must be unique within a Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="323.6924" x="1297.48" y="304.1211">- Inactive RoleDefinition cannot be newly assigned.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="390.0444" x="1297.48" y="319.4316">- Team keeps a default condition window (7/14/30/90 days).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="347.8706" x="1297.48" y="334.7422">- Cannot remove last active manager if policy requires.</text></g><!--reverse link Team to TeamMember--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="73" id="lnk11"><path codeLine="73" d="M303.9996,446.0891 C285.4896,469.4091 274.51,483.24 257.81,504.29" fill="none" id="Team-backto-TeamMember" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="311.46,436.69,304.5968,438.9027,303.9996,446.0891,310.8628,443.8763,311.46,436.69" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="