y-modifier="PUBLIC_FIELD"><ellipse cx="254.5" cy="357.9141" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="89.9131" x="263.5" y="361.2607">alertId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.5" cy="374.2109" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.4639" x="263.5" y="377.5576">actionPlanId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.5" cy="390.5078" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="78.1758" x="263.5" y="393.8545">priority: Int</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.5" cy="406.8047" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.6934" x="263.5" y="410.1514">rationale: Json?</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.5" cy="423.1016" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.2246" x="263.5" y="426.4482">suggestedAt: DateTime</text><line style="stroke:#181818;stroke-width:0.5;" x1="244.5" x2="459.959" y1="433.75" y2="433.75"/></g><g class="entity" data-qualified-name="GMN11" data-source-line="51" id="ent0012"><path d="M494.5,84.5 L494.5,138.5 L459.76,142.5 L494.5,146.5 L494.5,200.4297 A0,0 0 0 0 494.5,200.4297 L1035.5063,200.4297 A0,0 0 0 0 1035.5063,200.4297 L1035.5063,94.5 L1025.5063,84.5 L494.5,84.5 A0,0 0 0 0 494.5,84.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1025.5063,84.5 L1025.5063,94.5 L1035.5063,94.5 L1025.5063,84.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="500.5" y="101.5669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.6719" x="500.5" y="116.6997">- Alert is always scoped to exactly one Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.2275" x="500.5" y="131.8325">- `level` is immutable after creation.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="520.0063" x="500.5" y="146.9653">- Resolving an alert sets `isResolved=true` and closes the latest open AlertLog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="452.4229" x="500.5" y="162.0981">- Reopening an alert creates a new AlertLog with `resolvedAt = null`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="335.3721" x="500.5" y="177.231">- Each Alert must suggest one or more ActionPlans.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.2427" x="500.5" y="192.3638">- ActionPlans are reusable across multiple Alerts.</text></g><!--reverse link Alert to AlertLog--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="45" id="lnk8"><path codeLine="45" d="M231.4784,252.6477 C208.6984,275.9877 193.54,291.53 173.12,312.45" fill="none" id="Alert-backto-AlertLog" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="239.86,244.06,232.8066,245.56,231.4784,252.6477,238.5317,251.1477,239.86,244.06" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="224.3545" y="264.1432">1</text><text fill=