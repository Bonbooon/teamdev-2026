-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="89.9131" x="263.27" y="401.0607">alertId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.27" cy="414.0109" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.4639" x="263.27" y="417.3576">actionPlanId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.27" cy="430.3078" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="78.1758" x="263.27" y="433.6545">priority: Int</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.27" cy="446.6047" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.6934" x="263.27" y="449.9514">rationale: Json?</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="254.27" cy="462.9016" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.2246" x="263.27" y="466.2482">suggestedAt: DateTime</text><line style="stroke:#181818;stroke-width:0.5;" x1="244.27" x2="459.729" y1="473.55" y2="473.55"/></g><g class="entity" data-qualified-name="GMN11" data-source-line="50" id="ent0012"><path d="M494.5,132.52 L494.5,248.4497 L1035.5063,248.4497 L1035.5063,142.52 L1025.5063,132.52 L494.5,132.52" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1025.5063,132.52 L1025.5063,142.52 L1035.5063,142.52 L1025.5063,132.52" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="500.5" y="149.5869">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.6719" x="500.5" y="164.7197">- Alert is always scoped to exactly one Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.2275" x="500.5" y="179.8525">- `level` is immutable after creation.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="520.0063" x="500.5" y="194.9853">- Resolving an alert sets `isResolved=true` and closes the latest open AlertLog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="452.4229" x="500.5" y="210.1181">- Reopening an alert creates a new AlertLog with `resolvedAt = null`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="335.3721" x="500.5" y="225.251">- Each Alert must suggest one or more ActionPlans.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.2427" x="500.5" y="240.3838">- ActionPlans are reusable across multiple Alerts.</text></g><!--reverse link Alert to AlertLog--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="44" id="lnk8"><path codeLine="44" d="M159.8791,295.4251 C151.0791,318.2251 146.2,330.85 138.17,351.64" fill="none" id="Alert-backto-AlertLog" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="164.2,284.23,158.3079,288.3872,159.8791,295.4251,165.7712,291.2678,164.2,284.23" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="153.2873" y="303.7373">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="116.5213" y="340.79">0..*</text></g><!--reverse link Alert to AlertActionPlanSuggestion--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007"