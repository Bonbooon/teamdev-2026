h="295.3247" x="486.4" y="165.3989">- Alert is always scoped to exactly one Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.0664" x="486.4" y="180.7095">- `level` is immutable after creation.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="506.1938" x="486.4" y="196.02">- Resolving an alert sets `isResolved=true` and closes the latest open AlertLog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="441.7524" x="486.4" y="211.3305">- Reopening an alert creates a new AlertLog with `resolvedAt = null`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.3804" x="486.4" y="226.6411">- Each Alert must suggest one or more ActionPlans.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.7334" x="486.4" y="241.9516">- ActionPlans are reusable across multiple Alerts.</text></g><!--reverse link Alert to AlertLog--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="44" id="lnk8"><path codeLine="44" d="M155.251,297.0626 C146.611,319.8826 141.84,332.47 133.96,353.29" fill="none" id="Alert-backto-AlertLog" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="159.5,285.84,153.6346,290.0349,155.251,297.0626,161.1163,292.8676,159.5,285.84" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="148.6072" y="305.9277">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22.7119" x="113.3844" y="342.8858">0..*</text></g><!--reverse link Alert to AlertActionPlanSuggestion--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="composition" data-source-line="45" id="ln