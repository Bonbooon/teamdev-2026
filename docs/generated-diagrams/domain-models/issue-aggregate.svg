.1511" y2="719.1511"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="1969.04" cy="732.8952" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="90.4326" x="1978.04" y="736.6863">issueId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="1969.04" cy="749.3835" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="183.9209" x="1978.04" y="753.1745">issueTemplateItemId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="1969.04" cy="765.8718" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="73.1514" x="1978.04" y="769.6628">value: Json</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="1969.04" cy="782.3601" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.0566" x="1978.04" y="786.1511">createdAt: DateTime</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="1969.04" cy="798.8484" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="144.6689" x="1978.04" y="802.6394">updatedAt: DateTime</text><line style="stroke:#181818;stroke-width:0.5;" x1="1959.04" x2="2166.9609" y1="809.5925" y2="809.5925"/></g><g class="entity" data-qualified-name="GMN29" data-source-line="152" id="ent0030"><path d="M2374.23,200.1 L2374.23,485.6898 L2955.7725,485.6898 L2955.7725,210.1 L2945.7725,200.1 L2374.23,200.1" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2945.7725,200.1 L2945.7725,210.1 L2955.7725,210.1 L2945.7725,200.1" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91.0063" x="2380.23" y="217.6684">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.4106" x="2380.23" y="232.9789">- Issue belongs to exactly one Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.0894" x="2380.23" y="248.2895">- Issue is scoped to one or multiple Teams inside the Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="380.9736" x="2380.23" y="263.6">- Every IssueTeam must belong to the same Project context.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="473.4399" x="2380.23" y="278.9105">- Assignee(s) must be TeamMember(s) of at least one assigned IssueTeam.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.9648" x="2380.23" y="294.2211">- Cannot assign inactive TeamMember.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="443.2632" x="2380.23" y="309.5316">- Cannot transition to `done` without at least one Definition of Done.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="407.7036" x="2380.23" y="324.8422">- Child issue (`parentIssueId`) must belong to the same Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="438.0581" x="2380.23" y="340.1527">- `startedAt`/`closedAt` must be time-consistent with `createdAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="472.875" x="2380.23" y="355.4633">- Workload contribution is tracked by `storyPoints` and work log minutes.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="356.8462" x="2380.23" y="370.7738">- `storyPoints` must follow Fibonacci set (1,2,3,5,8,13).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.9233" x="2380.23" y="386.0844">- `estimatedMinutes` must be non-negative.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="560.5425" x="2380.23" y="401.3949">- GitHub integration can append work logs via `github_api` / `github_actions` sources.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="511.2529" x="2380.23" y="416.7055">- Work log external ID uniqueness applies only when `externalLogId` is present.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.6816" x="2380.23" y="432.016">- Issue-level roles are managed by RoleDefinition catalog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.3311" x="2380.23" y="447.3266">- An issue role can have single or multiple owners.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="504.0293" x="2380.23" y="462.6371">- Issue role owners must be active TeamMember(s) of one of the Issue's Teams.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="501.0205" x="2380.23" y="477.9477">- Template item values are type-validated by `valueType` in app/service layer.</text></g><!--reverse link Issue to IssueTeam--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="138" id="lnk18"><path codeLine="138" d="M1410.1996,585.9468 C1431.1296,605.9768 1443.18,617.75 1463,637.31 C1481.58,655.64 1501.5,676.21 1518.93,694.54" fill="none" id="Issue-backto-IssueTeam" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1401.53,577.65,1403.0992,584.6883,1410.1996,585.9468,1408.6304,578.9085,1401.53,577.65" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="1401.7212" y="598.1725">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22.7119" x="1489.2792" y="684.3097">1..*</text></g><!--reverse link Issue to StoryPoints--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="139" id="lnk19"><path codeLine="139" d="M1550.7181,559.2603 C1596.1381,586.4303 1630.93,608.65 1673,637.31 C1702.2,657.2 1732.83,681.95 1757.42,702.91" fill="none" id="Issue-backto-StoryPoints" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1540.42,553.1,1543.5156,559.6128,1550.7181,559.2603,1547.6225,552.7474,1540.42,553.1" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to EstimatedMinutes--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="composition" data-source-line="140" id="lnk20"><path codeLine="140" d="M743.952,461.7933 C602.252,509.2833 454.76,566.24 317,637.31 C281.39,655.68 244.59,681.2 215.68,703.01" fill="none" id="Issue-backto-EstimatedMinutes" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="755.33,457.98,748.3699,456.094,743.952,461.7933,750.9121,463.6793,755.33,457.98" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to IssueAssignee--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="composition" data-source-line="141" id="lnk21"><path codeLine="141" d="M744.6756,505.6236 C664.5656,545.0936 593.93,585.81 523,637.31 C497.52,655.81 473.21,681.21 454.61,702.92" fill="none" id="Issue-backto-IssueAssignee" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="755.44,500.32,748.2899,499.3837,744.6756,505.6236,751.8257,506.5599,7