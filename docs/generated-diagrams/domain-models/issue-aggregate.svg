.41"/></g><g class="entity" data-qualified-name="GMN29" data-source-line="152" id="ent0030"><path d="M2450.51,199.88 L2450.51,482.2706 L3035.4929,482.2706 L3035.4929,209.88 L3025.4929,199.88 L2450.51,199.88" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3025.4929,199.88 L3025.4929,209.88 L3035.4929,209.88 L3025.4929,199.88" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="2456.51" y="216.9469">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.7554" x="2456.51" y="232.0797">- Issue belongs to exactly one Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.4365" x="2456.51" y="247.2125">- Issue is scoped to one or multiple Teams inside the Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="394.2275" x="2456.51" y="262.3453">- Every IssueTeam must belong to the same Project context.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="490.8643" x="2456.51" y="277.4781">- Assignee(s) must be TeamMember(s) of at least one assigned IssueTeam.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.9473" x="2456.51" y="292.611">- Cannot assign inactive TeamMember.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="448.5317" x="2456.51" y="307.7438">- Cannot transition to `done` without at least one Definition of Done.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.8032" x="2456.51" y="322.8766">- Child issue (`parentIssueId`) must belong to the same Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="434.6304" x="2456.51" y="338.0094">- `startedAt`/`closedAt` must be time-consistent with `createdAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="479.7939" x="2456.51" y="353.1422">- Workload contribution is tracked by `storyPoints` and work log minutes.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="360.0835" x="2456.51" y="368.275">- `storyPoints` must follow Fibonacci set (1,2,3,5,8,13).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.9863" x="2456.51" y="383.4078">- `estimatedMinutes` must be non-negative.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="563.9829" x="2456.51" y="398.5406">- GitHub integration can append work logs via `github_api` / `github_actions` sources.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.5742" x="2456.51" y="413.6735">- Work log external ID uniqueness applies only when `externalLogId` is present.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.7842" x="2456.51" y="428.8063">- Issue-level roles are managed by RoleDefinition catalog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.5103" x="2456.51" y="443.9391">- An issue role can have single or multiple owners.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.3965" x="2456.51" y="459.0719">- Issue role owners must be active TeamMember(s) of one of the Issue's Teams.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="515.0361" x="2456.51" y="474.2047">- Template item values are type-validated by `valueType` in app/service layer.</text></g><!--reverse link Issue to IssueTeam--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="138" id="lnk18"><path codeLine="138" d="M1453.6232,581.3306 C1475.5032,601.3506 1488.3,613.34 1509,632.92 C1528.13,651.01 1548.61,671.35 1566.54,689.5" fill="none" id="Issue-backto-IssueTeam" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1444.77,573.23,1446.4964,580.2314,1453.6232,581.3306,1451.8968,574.3292,1444.77,573.23" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="1445.2652" y="593.1628">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="1535.6034" y="678.819">1..*</text></g><!--reverse link Issue to StoryPoints--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="139" id="lnk19"><path codeLine="139" d="M1601.5645,557.3788 C1647.3845,583.7088 1682.44,605.18 1725,632.92 C1755.15,652.56 1786.91,677.06 1812.44,697.81" fill="none" id="Issue-backto-StoryPoints" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1591.16,551.4,1594.3693,557.8576,1601.5645,557.3788,1598.3552,550.9213,1591.16,551.4" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to EstimatedMinutes--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="composition" data-source-line="140" id="lnk20"><path codeLine="140" d="M761.2395,461.2848 C617.6395,508.0348 468.79,563.73 329,632.92 C292.43,651.02 254.4,676.14 224.38,697.67" fill="none" id="Issue-backto-EstimatedMinutes" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="772.65,457.57,765.7065,455.6239,761.2395,461.2848,768.183,463.2309,772.65,457.57" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to IssueAssignee--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-l