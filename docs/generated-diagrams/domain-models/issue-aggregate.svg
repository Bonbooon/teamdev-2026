sans-serif" font-size="14" lengthAdjust="spacing" textLength="289.9463" x="317" y="343.042">valueType: IssueTemplateItemValueType</text><line style="stroke:#181818;stroke-width:0.5;" x1="298" x2="611.9463" y1="350.3438" y2="350.3438"/></g><!--class IssueTemplateItemValue--><g class="entity" data-qualified-name="Issue Aggregate.IssueTemplateItemValue" data-source-line="130" id="ent0017"><rect fill="#F1F1F1" height="137.75" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="217.6797" x="199" y="605.5"/><ellipse cx="219.3165" cy="625.6328" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M222.2853,631.2734 Q221.7071,631.5703 221.0665,631.7109 Q220.4259,631.8672 219.7228,631.8672 Q217.2228,631.8672 215.8946,630.2266 Q214.5821,628.5703 214.5821,625.4453 Q214.5821,622.3203 215.8946,620.6641 Q217.2228,619.0078 219.7228,619.0078 Q220.4259,619.0078 221.0665,619.1641 Q221.7228,619.3203 222.2853,619.6172 L222.2853,622.3359 Q221.6603,621.7578 221.0665,621.4922 Q220.4728,621.2109 219.8478,621.2109 Q218.504,621.2109 217.8165,622.2891 Q217.129,623.3516 217.129,625.4453 Q217.129,627.5391 217.8165,628.6172 Q218.504,629.6797 219.8478,629.6797 Q220.4728,629.6797 221.0665,629.4141 Q221.6603,629.1328 222.2853,628.5547 L222.2853,631.2734 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="49.8457" x="296.5077" y="621.6387">&#171;Entity&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="173.8652" x="234.4979" y="637.4639">IssueTemplateItemValue</text><line style="stroke:#181818;stroke-width:0.5;" x1="200" x2="415.6797" y1="645.7656" y2="645.7656"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="659.4141" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.5498" x="219" y="662.7607">issueId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="675.7109" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="191.6797" x="219" y="679.0576">issueTemplateItemId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="692.0078" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.2686" x="219" y="695.3545">value: Json</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="708.3047" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="146.0225" x="219" y="711.6514">createdAt: DateTime</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="724.6016" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="150.6025" x="219" y="727.9482">updatedAt: DateTime</text><line style="stroke:#181818;stroke-width:0.5;" x1="200" x2="415.6797" y1="735.25" y2="735.25"/></g><g class="entity" data-qualified-name="GMN29" data-source-line="152" id="ent0030"><path d="M2449.5,132 L2449.5,269 L1850.1,273 L2449.5,277 L2449.5,414.3906 A0,0 0 0 0 2449.5,414.3906 L3034.4829,414.3906 A0,0 0 0 0 3034.4829,414.3906 L3034.4829,142 L3024.4829,132 L2449.5,132 A0,0 0 0 0 2449.5,132" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3024.4829,132 L3024.4829,142 L3034.4829,142 L3024.4829,132" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="2455.5" y="149.0669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.7554" x="2455.5" y="164.1997">- Issue belongs to exactly one Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.4365" x="2455.5" y="179.3325">- Issue is scoped to one or multiple Teams inside the Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="394.2275" x="2455.5" y="194.4653">- Every IssueTeam must belong to the same Project context.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="490.8643" x="2455.5" y="209.5981">- Assignee(s) must be TeamMember(s) of at least one assigned IssueTeam.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.9473" x="2455.5" y="224.731">- Cannot assign inactive TeamMember.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="448.5317" x="2455.5" y="239.8638">- Cannot transition to `done` without at least one Definition of Done.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.8032" x="2455.5" y="254.9966">- Child issue (`parentIssueId`) must belong to the same Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="434.6304" x="2455.5" y="270.1294">- `startedAt`/`closedAt` must be time-consistent with `createdAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="479.7939" x="2455.5" y="285.2622">- Workload contribution is tracked by `storyPoints` and work log minutes.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="360.0835" x="2455.5" y="300.395">- `storyPoints` must follow Fibonacci set (1,2,3,5,8,13).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.9863" x="2455.5" y="315.5278">- `estimatedMinutes` must be non-negative.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="563.9829" x="2455.5" y="330.6606">- GitHub integration can append work logs via `github_api` / `github_actions` sources.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.5742" x="2455.5" y="345.7935">- Work log external ID uniqueness applies only when `externalLogId` is present.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.7842" x="2455.5" y="360.9263">- Issue-level roles are managed by RoleDefinition catalog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.5103" x="2455.5" y="376.0591">- An issue role can have single or multiple owners.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.3965" x="2455.5" y="391.1919">- Issue role owners must be active TeamMember(s) of one of the Issue's Teams.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="515.0361" x="2455.5" y="406.3247">- Template item values are type-validated by `valueType` in app/service layer.</text></g><!--reverse link Issue to IssueTeam--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="138" id="lnk18"><path codeLine="138" d="M1860.1702,507.3479 C1891.2102,528.1379 1911.53,543 1940,565 C1961.77,581.82 1983.59,602.77 2001.86,621.77" fill="none" id="Issue-backto-IssueTeam" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1850.2,500.67,1852.9592,507.3324,1860.1702,507.3479,1857.4111,500.6855,1850.2,500.67" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="1858.5956" y="502.2136">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="1971.4961" y="611.1184">1..*</text></g><!--reverse link Issue to StoryPoints--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="139" id="lnk19"><path codeLine="139" d="M1861.2595,422.4408 C1963.7895,464.5708 2060.6,509.78 2156,565 C2187.79,583.4 2220.32,608.39 2245.91,629.75" fill="none" id="Issue-backto-StoryPoints" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1850.16,417.88,1854.1895,423.8602,1861.2595,422.4408,1857.23,416.4606,1850.16,417.88" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to EstimatedMinutes--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="composition" data-source-line="140" id="lnk20"><path codeLine="140" d="M1020.6459,438.7265 C929.3759,478.4265 845.15,518.3 759,565 C723.73,584.12 686.41,608.78 656.48,629.77" fill="none" id="Issue-backto-EstimatedMinutes" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1031.65,433.94,1024.5525,432.6652,1020.6459,438.7265,1027.7435,440.0013,1031.65,433.94" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to IssueAssignee--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="composition" data-source-line="141" id="lnk21"><path codeLine="141" d="M1041.0019,512.068 C1013.4519,531.548 996.37,544.67 971,565 C946.75,584.44 922.34,609.01 903.06,629.85" fill="none" id="Issue-backto-IssueAssignee" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1050.8,505.14,1043.5916,505.338,1041.0019,512.068,1048.2103,511.87,1050.8,505.14" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="1029.8693" y="525.0774">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengt