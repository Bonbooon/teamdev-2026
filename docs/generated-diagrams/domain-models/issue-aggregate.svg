talic" lengthAdjust="spacing" textLength="49.8457" x="296.5077" y="630.1387">&#171;Entity&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="173.8652" x="234.4979" y="645.9639">IssueTemplateItemValue</text><line style="stroke:#181818;stroke-width:0.5;" x1="200" x2="415.6797" y1="654.2656" y2="654.2656"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="667.9141" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.5498" x="219" y="671.2607">issueId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="684.2109" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="191.6797" x="219" y="687.5576">issueTemplateItemId: UUID</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="700.5078" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.2686" x="219" y="703.8545">value: Json</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="716.8047" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="146.0225" x="219" y="720.1514">createdAt: DateTime</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="210" cy="733.1016" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="150.6025" x="219" y="736.4482">updatedAt: DateTime</text><line style="stroke:#181818;stroke-width:0.5;" x1="200" x2="415.6797" y1="743.75" y2="743.75"/></g><g class="entity" data-qualified-name="GMN29" data-source-line="154" id="ent0030"><path d="M2449.5,132 L2449.5,269 L1850.1,273 L2449.5,277 L2449.5,414.3906 A0,0 0 0 0 2449.5,414.3906 L3034.4829,414.3906 A0,0 0 0 0 3034.4829,414.3906 L3034.4829,142 L3024.4829,132 L2449.5,132 A0,0 0 0 0 2449.5,132" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3024.4829,132 L3024.4829,142 L3034.4829,142 L3024.4829,132" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="2455.5" y="149.0669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.7554" x="2455.5" y="164.1997">- Issue belongs to exactly one Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.4365" x="2455.5" y="179.3325">- Issue is scoped to one or multiple Teams inside the Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="394.2275" x="2455.5" y="194.4653">- Every IssueTeam must belong to the same Project context.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="490.8643" x="2455.5" y="209.5981">- Assignee(s) must be TeamMember(s) of at least one assigned IssueTeam.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.9473" x="2455.5" y="224.731">- Cannot assign inactive TeamMember.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="448.5317" x="2455.5" y="239.8638">- Cannot transition to `done` without at least one Definition of Done.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.8032" x="2455.5" y="254.9966">- Child issue (`parentIssueId`) must belong to the same Project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="434.6304" x="2455.5" y="270.1294">- `startedAt`/`closedAt` must be time-consistent with `createdAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="479.7939" x="2455.5" y="285.2622">- Workload contribution is tracked by `storyPoints` and work log minutes.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="360.0835" x="2455.5" y="300.395">- `storyPoints` must follow Fibonacci set (1,2,3,5,8,13).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.9863" x="2455.5" y="315.5278">- `estimatedMinutes` must be non-negative.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="563.9829" x="2455.5" y="330.6606">- GitHub integration can append work logs via `github_api` / `github_actions` sources.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.5742" x="2455.5" y="345.7935">- Work log external ID uniqueness applies only when `externalLogId` is present.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.7842" x="2455.5" y="360.9263">- Issue-level roles are managed by RoleDefinition catalog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.5103" x="2455.5" y="376.0591">- An issue role can have single or multiple owners.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="521.3965" x="2455.5" y="391.1919">- Issue role owners must be active TeamMember(s) of one of the Issue's Teams.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="515.0361" x="2455.5" y="406.3247">- Template item values are type-validated by `valueType` in app/service layer.</text></g><!--reverse link Issue to IssueTeam--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="140" id="lnk18"><path codeLine="140" d="M1860.0751,505.5895 C1891.2451,526.8395 1911.66,542.24 1940,565 C1963.92,584.21 1987.41,608.76 2006.33,630.41" fill="none" id="Issue-backto-IssueTeam" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1850.16,498.83,1852.8643,505.5148,1860.0751,505.5895,1857.3707,498.9048,1850.16,498.83" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="1858.5548" y="500.3362">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="1976.2076" y="619.4007">1..*</text></g><!--reverse link Issue to StoryPoints--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="141" id="lnk19"><path codeLine="141" d="M1861.2899,419.4499 C1964.2099,461.7299 2061.2,507.77 2156,565 C2190.16,585.62 2224.5,614.43 2250.5,638.3" fill="none" id="Issue-backto-StoryPoints" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1850.19,414.89,1854.22,420.8699,1861.2899,419.4499,1857.2599,413.47,1850.19,414.89" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to EstimatedMinutes--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="composition" data-source-line="142" id="lnk20"><path codeLine="142" d="M1020.7605,435.9069 C929.1305,475.8669 844.73,516.55 759,565 C721.09,586.42 681.42,614.96 650.82,638.49" fill="none" id="Issue-backto-EstimatedMinutes" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1031.76,431.11,1024.6613,429.8419,1020.7605,435.9069,1027.8592,437.175,1031.76,431.11" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Issue to IssueAssignee--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-lin