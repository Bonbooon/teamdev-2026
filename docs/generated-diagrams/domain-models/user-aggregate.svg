<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="748px" preserveAspectRatio="none" style="width:1207px;height:748px;background:#FFFFFF;" version="1.1" viewBox="0 0 1207 748" width="1207px" zoomAndPan="magnify"><title>Identity &amp; Access Context - User Aggregate</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="343.6631" x="424.6685" y="22.9951">Identity &amp; Access Context - User Aggregate</text></g><!--cluster Identity & Access Context--><g class="cluster" data-qualified-name="Identity . Access Context" data-source-line="7" id="ent0002"><rect fill="none" height="697.95" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.5;" width="1194" x="7" y="44.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="204.1963" x="501.9019" y="59.292">Identity &amp; Access Context</text></g><!--cluster User Aggregate--><g class="cluster" data-qualified-name="Identity . Access Context.User Aggregate" data-source-line="9" id="ent0003"><rect fill="none" height="630.95" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.5;" width="652" x="31" y="87.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="123.9082" x="295.0459" y="102.292">User Aggregate</text></g><g class="entity" data-qualified-name="Identity . Access Context.GMN11" data-source-line="67" id="ent0012"><path d="M698.97,173.1069 L698.97,244.2069 L623.82,248.2069 L698.97,252.2069 L698.97,323.3022 A0,0 0 0 0 698.97,323.3022 L1185.0325,323.3022 A0,0 0 0 0 1185.0325,323.3022 L1185.0325,183.1069 L1175.0325,173.1069 L698.97,173.1069 A0,0 0 0 0 698.97,173.1069" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1175.0325,173.1069 L1175.0325,183.1069 L1185.0325,183.1069 L1175.0325,173.1069" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="704.97" y="205.3066">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.144" x="704.97" y="220.4394">1. Email must be unique, normalized, and non-null.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.4512" x="704.97" y="235.5722">2. Profile cannot exist without User.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7778" x="704.97" y="250.705">3. (provider, providerUserId) must be globally unique.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.7744" x="704.97" y="265.8378">4. Email verification can transition to verified only once.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.9063" x="704.97" y="280.9706">5. Deleting User removes Profile/OAuthAccounts by cascade.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="459.0625" x="704.97" y="296.1035">6. A User can have multiple external links (Instagram, Wantedly, etc.).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="297.3687" x="704.97" y="311.2363">7. External link URL must be unique per User.</text><line style="stroke:#181818;stroke-width:1;" x1="699.97" x2="838.8391" y1="185.6733" y2="185.6733"/><line style="stroke:#181818;stroke-width:1;" x1="699.97" x2="838.8391" y1="187.6733" y2="187.6733"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.3242" x="838.8391" y="189.6738">Domain Rules (User Aggregate)</text><line style="stroke:#181818;stroke-width:1;" x1="1045.1634" x2="1184.0325" y1="185.6733" y2="185.6733"/><line style="stroke:#181818;stroke-width:1;" x1="1045.1634" x2="1184.0325" y1="187.6733" y2="187.6733"/></g><!--class User--><g class="entity" data-qualified-name="Identity . Access Context.User Aggregate.User" data-source-line="11" id="ent0004"><rect fill="#F1F1F1" height="251.8281" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="433.0186" x="190.49" y="122.2969"/><ellipse cx="350.1633" cy="142.4297" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M353.1321,148.0703 Q352.554,148.3672 351.9133,148.5078 Q351.2727,148.6641 350.5696,148.6641 Q348.0696,148.6641 346.7415,147.0234 Q345.429,145.3672 345.429,142.2422 Q345.429,139.1172 346.7415,137.4609 Q348.0696,135.8047 350.5696,135.8047 Q351.2727,135.8047 351.9133,135.9609 Q352.5696,136.1172 353.1321,136.4141 L353.1321,139.1328 Q352.5071,138.5547 351.9133,138.2891 Q351.3196,138.0078 350.6946,138.0078 Q349.3508,138.0078 348.6633,139.0859 Q347.9758,140.1484 347.9758,142.2422 Q347.9758,144.3359 348.6633,145.4141 Q349.3508,146.4766 350.6946,146.4766 Q351.3196,146.4766 351.9133,146.2109 Q352.5071,145.9297 353.1321,145.3516 L353.1321,148.0703 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="109.1719" x="368.6633" y="138.4355">&#171;Aggregate Root&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="31.9102" x="407.2942" y="154.2607">User</text><line style="stroke:#181818;stroke-width:0.5;" x1="191.49" x2="622.5086" y1="162.5625" y2="162.5625"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="69.0771" x="196.49" y="179.5576">+id: UUID</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="101.2881" x="196.49" y="195.8545">+email: String</text><text fill="#000000" font-family="sans-serif" font-si