<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="753px" preserveAspectRatio="none" style="width:1167px;height:753px;background:#FFFFFF;" version="1.1" viewBox="0 0 1167 753" width="1167px" zoomAndPan="magnify"><title>Identity &amp; Access Context - User Aggregate</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="315.0889" x="418.9556" y="23.5352">Identity &amp; Access Context - User Aggregate</text></g><!--cluster Identity & Access Context--><g class="cluster" data-qualified-name="Identity . Access Context" data-source-line="7" id="ent0002"><rect fill="none" height="703.45" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.5;" width="1154" x="7" y="44.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="184.8232" x="491.5884" y="60.0234">Identity &amp; Access Context</text></g><!--cluster User Aggregate--><g class="cluster" data-qualified-name="Identity . Access Context.User Aggregate" data-source-line="9" id="ent0003"><rect fill="none" height="636.45" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.5;" width="632" x="31" y="87.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="112.0957" x="290.9521" y="103.0234">User Aggregate</text></g><g class="entity" data-qualified-name="Identity . Access Context.GMN11" data-source-line="67" id="ent0012"><path d="M678.96,173.8283 L678.96,245.7283 L604.78,249.7283 L678.96,253.7283 L678.96,325.6232 A0,0 0 0 0 678.96,325.6232 L1145.0337,325.6232 A0,0 0 0 0 1145.0337,325.6232 L1145.0337,183.8283 L1135.0337,173.8283 L678.96,173.8283 A0,0 0 0 0 678.96,173.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1135.0337,173.8283 L1135.0337,183.8283 L1145.0337,183.8283 L1135.0337,173.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1133" x="684.96" y="206.7072">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.6533" x="684.96" y="222.0177">1. Email must be unique, normalized, and non-null.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1416" x="684.96" y="237.3283">2. Profile cannot exist without User.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="339.2759" x="684.96" y="252.6388">3. (provider, providerUserId) must be globally unique.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="352.1362" x="684.96" y="267.9494">4. Email verification can transition to verified only once.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.8901" x="684.96" y="283.2599">5. Deleting User removes Profile/OAuthAccounts by cascade.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="439.0737" x="684.96" y="298.5705">6. A User can have multiple external links (Instagram, Wantedly, etc.).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.5869" x="684.96" y="313.881">7. External link URL must be unique per User.</text><line style="stroke:#181818;stroke-width:1;" x1="679.96" x2="813.5447" y1="186.4836" y2="186.4836"/><line style="stroke:#181818;stroke-width:1;" x1="679.96" x2="813.5447" y1="188.4836" y2="188.4836"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.9043" x="813.5447" y="190.8966">Domain Rules (User Aggregate)</text><line style="stroke:#181818;stroke-width:1;" x1="1010.449" x2="1144.0337" y1="186.4836" y2="186.4836"/><line style="stroke:#181818;stroke-width:1;" x1="1010.449" x2="1144.0337" y1="188.4836" y2="188.4836"/></g><!--class User--><g class="entity" data-qualified-name="Identity . Access Context.User Aggregate.User" data-source-line="11" id="ent0004"><rect fill="#F1F1F1" height="254.4805" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="418.834" x="185.58" y="122.4883"/><ellipse cx="341.0907" cy="142.7988" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M343.5639,148.9419 Q342.9828,149.2407 342.3437,149.3901 Q341.7045,149.5396 340.9989,149.5396 Q338.4921,149.5396 337.1723,147.8877 Q335.8525,146.2358 335.8525,143.1147 Q335.8525,139.9854 337.1723,138.3335 Q338.4921,136.6816 340.9989,136.6816 Q341.7045,136.6816 342.352,136.8311 Q342.9994,136.9805 343.5639,137.2793 L343.5639,140.002 Q342.933,139.4209 342.3395,139.1511 Q341.746,138.8813 341.1152,138.8813 Q339.7704,138.8813 339.0856,139.948 Q338.4008,141.0146 338.4008,143.1147 Q338.4008,145.2065 339.0856,146.2732 Q339.7704,147.3398 341.1152,147.3398 Q341.746,147.3398 342.3395,147.0701 Q342.933,146.8003 343.5639,146.2192 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="103.3125" x="359.5907" y="139.0898">&#171;Aggregate Root&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="30.3652" x="396.0644" y="155.1563">User</text><line style="stroke:#181818;stroke-width:0.5;" x1="186.58" x2="603.414" y1="163.1094" y2="163.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="66.7666" x="191.58" y="180.6445">+id: UUID</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.6533" x="191.58" y="197.1328">+email: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="sp