<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="732px" preserveAspectRatio="none" style="width:1211px;height:732px;background:#FFFFFF;" version="1.1" viewBox="0 0 1211 732" width="1211px" zoomAndPan="magnify"><title>Identity &amp; Access Context - User Aggregate</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="343.6631" x="426.6685" y="22.9951">Identity &amp; Access Context - User Aggregate</text></g><!--cluster Identity & Access Context--><g class="cluster" data-qualified-name="Identity . Access Context" data-source-line="7" id="ent0002"><rect fill="none" height="682" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.5;" width="1198" x="7" y="44.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="204.1963" x="503.9019" y="59.292">Identity &amp; Access Context</text></g><!--cluster User Aggregate--><g class="cluster" data-qualified-name="Identity . Access Context.User Aggregate" data-source-line="9" id="ent0003"><rect fill="none" height="615" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1.5;" width="652" x="529" y="87.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="123.9082" x="793.0459" y="102.292">User Aggregate</text></g><g class="entity" data-qualified-name="Identity . Access Context.GMN11" data-source-line="66" id="ent0012"><path d="M22.5,150.2969 L22.5,330.7578 A0,0 0 0 0 22.5,330.7578 L513.1646,330.7578 A0,0 0 0 0 513.1646,330.7578 L513.1646,244.2969 L598.46,240.2969 L513.1646,236.2969 L513.1646,160.2969 L503.1646,150.2969 L22.5,150.2969 A0,0 0 0 0 22.5,150.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M503.1646,150.2969 L503.1646,160.2969 L513.1646,160.2969 L503.1646,150.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="28.5" y="182.4966">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.144" x="28.5" y="197.6294">1. Email must be unique, normalized, and non-null.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.4512" x="28.5" y="212.7622">2. Profile cannot exist without User.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7778" x="28.5" y="227.895">3. (provider, providerUserId) must be globally unique.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.7744" x="28.5" y="243.0278">4. Email verification can transition to verified only once.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.9063" x="28.5" y="258.1606">5. Deleting User removes Profile/OAuthAccounts by cascade.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="459.0625" x="28.5" y="273.2935">6. A User can have multiple external links (Instagram, Wantedly, etc.).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="297.3687" x="28.5" y="288.4263">7. External link URL must be unique per User.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="463.6646" x="28.5" y="303.5591">8. Google avatar is stored on User and refreshed on each Google login.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="420.145" x="28.5" y="318.6919">9. Profile.avatarUrl is reserved for future custom avatar support.</text><line style="stroke:#181818;stroke-width:1;" x1="23.5" x2="164.6702" y1="162.8633" y2="162.8633"/><line style="stroke:#181818;stroke-width:1;" x1="23.5" x2="164.6702" y1="164.8633" y2="164.8633"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.3242" x="164.6702" y="166.8638">Domain Rules (User Aggregate)</text><line style="stroke:#181818;stroke-width:1;" x1="370.9944" x2="512.1646" y1="162.8633" y2="162.8633"/><line style="stroke:#181818;stroke-width:1;" x1="370.9944" x2="512.1646" y1="164.8633" y2="164.8633"/></g><!--class User--><g class="entity" data-qualified-name="Identity . Access Context.User Aggregate.User" data-source-line="11" id="ent0004"><rect fill="#F1F1F1" height="235.5313" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="433.0186" x="598.5" y="122.2969"/><ellipse cx="758.1733" cy="142.4297" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M761.1421,148.0703 Q760.564,148.3672 759.9233,148.5078 Q759.2827,148.6641 758.5796,148.6641 Q756.0796,148.6641 754.7515,147.0234 Q753.439,145.3672 753.439,142.2422 Q753.439,139.1172 754.7515,137.4609 Q756.0796,135.8047 758.5796,135.8047 Q759.2827,135.8047 759.9233,135.9609 Q760.5796,136.1172 761.1421,136.4141 L761.1421,139.1328 Q760.5171,138.5547 759.9233,138.2891 Q759.3296,138.0078 758.7046,138.0078 Q757.3608,138.0078 756.6733,139.0859 Q755.9858,140.1484 755.9858,142.2422 Q755.9858,144.3359 756.6733,145.4141 Q757.3608,146.4766 758.7046,146.4766 Q759.3296,146.4766 759.9233,146.2109 Q760.5171,145.9297 761.1421,145.3516 L761.1421,148.0703 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="109.1719" x="776.6733" y="138.4355">&#171;Aggregate Root&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="31.9102" x="815.3042" y="154.2607">User</text><line style="stroke:#181818;stroke-width:0.5;" x1="599.5" x2="1030.5186" y1="162.5625" y2=