.9937,86.5 L2633.9937,76.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="2180.5" y="93.5669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.8594" x="2180.5" y="108.6997">- Only active team members receive survey.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.4004" x="2180.5" y="123.8325">- One active SurveySetting per Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="362.2734" x="2180.5" y="138.9653">- `setterId` must be a TeamMember of the same Team.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="335.334" x="2180.5" y="154.0981">- Delivery times are interpreted in Team time zone.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="414.7559" x="2180.5" y="169.231">- Condition windows support 7/14/30/90 days (default 14 days).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="448.4937" x="2180.5" y="184.3638">- Member condition history returns score timeline (not raw answers).</text></g><!--reverse link SurveyTemplate to SurveyQuestion--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="94" id="lnk14"><path codeLine="94" d="M958,215.75 C958,242.18 958,260.56 958,287.71" fill="none" id="SurveyTemplate-backto-SurveyQuestion" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="958,203.75,954,209.75,958,215.75,962,209.75,958,203.75" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="949.6127" y="223.3908">1</text><text fill="#000000" font-