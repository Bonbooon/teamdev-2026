ngth="24.7051" x="749.53" y="707.94">idle</text><line style="stroke:#181818;stroke-width:0.5;" x1="744.53" x2="863.4607" y1="714.8931" y2="714.8931"/></g><g class="entity" data-qualified-name="GMN17" data-source-line="98" id="ent0018"><path d="M1129.21,235.72 L1129.21,368.2044 L1618.7813,368.2044 L1618.7813,245.72 L1608.7813,235.72 L1129.21,235.72" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1608.7813,235.72 L1608.7813,245.72 L1618.7813,245.72 L1608.7813,235.72" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91.0063" x="1135.21" y="253.2884">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.8579" x="1135.21" y="268.5989">- A Project can be assigned to multiple Teams.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.583" x="1135.21" y="283.9095">- Project completion prevents new Issues.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="461.3032" x="1135.21" y="299.22">- Due date-time can be null for backlog projects and is timezone-aware.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="378.5806" x="1135.21" y="314.5305">- Project-level roles are managed by RoleDefinition catalog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.146" x="1135.21" y="329.8411">- A project role can have single or multiple owners.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="428.6001" x="1135.21" y="345.1516">- Project role owners must belong to teams assigned to the project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="468.5713" x="1135.21" y="360.4622">- Team and member contribution metrics are captured in daily snapshots.</text></g><!--reverse link Project to ProjectTeam--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="90" id="lnk12"><path codeLine="90" d="M198.9483,497.9543 C174.1383,544.0043 155.18,579.2 137.12,612.73" fill="none" id="Project-backto-ProjectTeam" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="204.64,487.39,198.2727,490.7749,198.9483,497.9543,205.3156,494.5694,204.64,487.39" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="192.6068" y="507.5004">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22.7119" x="117.4684" y="602.165">1..*</text></g><!--reverse link Project to ProjectRoleAssignment--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="91" id="lnk13"><path codeLine="91" d="M315.396,499.3698 C317.656,538.2698 319.2,564.98 321.02,596.27" fill="none" id="Project-backto-ProjectRoleAssignment" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="314.7,487.39,311.0547,493.6119,315.396,499.3698,319.0413,493.1479,314.7,487.39" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="306.966" y="507.5004">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="22.7119" x="297.4203" y="585.418">0..*</text></g><!--reverse link Project to TeamProjectPerformanceDaily--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="composition" data-source-line="92" id="lnk14"><path codeLine="92" d="M452.4324,496.92 C467.7824,516.98 475.8,527.45 490.32,546.42" fill="none" id="Project-backto-TeamProjectPerformanceDaily" style="stroke:#181818;stroke-w