t="spacing" textLength="74.2793" x="771.47" y="686.3189">completed</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="25.2793" x="771.47" y="702.6157">idle</text><line style="stroke:#181818;stroke-width:0.5;" x1="766.47" x2="889.5345" y1="709.9175" y2="709.9175"/></g><g class="entity" data-qualified-name="GMN17" data-source-line="98" id="ent0018"><path d="M1172.41,235.07 L1172.41,366.1325 L1675.5843,366.1325 L1675.5843,245.07 L1665.5843,235.07 L1172.41,235.07" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1665.5843,235.07 L1665.5843,245.07 L1675.5843,245.07 L1665.5843,235.07" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="1178.41" y="252.1369">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.7134" x="1178.41" y="267.2697">- A Project can be assigned to multiple Teams.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.6606" x="1178.41" y="282.4025">- Project completion prevents new Issues.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="467.7969" x="1178.41" y="297.5353">- Due date-time can be null for backlog projects and is timezone-aware.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.1592" x="1178.41" y="312.6681">- Project-level roles are managed by RoleDefinition catalog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="332.2808" x="1178.41" y="327.801">- A project role can have single or multiple owners.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="439.4038" x="1178.41" y="342.9338">- Project role owners must belong to teams assigned to the project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="482.1743" x="1178.41" y="358.0666">- Team and member contribution metrics are captured in daily snapshots.</text></g><!--reverse link Project to ProjectTeam--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="composition" data-source-line="90" id="lnk12"><path codeLine="90" d="M206.4282,494.2814 C180.4182,540.0214 160.48,575.08 141.52,608.42" fill="none" id="Project-backto-ProjectTeam" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="212.36,483.85,205.917,487.0884,206.4282,494.2814,212.8712,491.043,212.36,483.85" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="200.1608" y="503.3705">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="120.8308" y="597.7556">1..*</text></g><!--reverse link Project to ProjectRoleAssignment--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="composition" data-source-line="91" id="lnk13"><path codeLine="91" d="M325.7486,495.8351 C327.6786,534.4751 329.01,560.95 330.57,592.05" fill="none" id="Project-backto-ProjectRoleAssignment" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="325.15,483.85,321.4543,490.0421,325.7486,495.8351,329.4443,489.643,325.15,483.85" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="317.3566" y="503.3705">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="306.0323" y="581.2063">0..*</text></g><!--reverse link Project to TeamProjectPerformanceDaily--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="composition" data-source-line="92" id="lnk14"><p