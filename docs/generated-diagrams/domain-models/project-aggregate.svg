<path d="M1172.5,158.5 L1172.5,220 L1137.76,224 L1172.5,228 L1172.5,289.5625 A0,0 0 0 0 1172.5,289.5625 L1675.6743,289.5625 A0,0 0 0 0 1675.6743,289.5625 L1675.6743,168.5 L1665.6743,158.5 L1172.5,158.5 A0,0 0 0 0 1172.5,158.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1665.6743,158.5 L1665.6743,168.5 L1675.6743,168.5 L1665.6743,158.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="1178.5" y="175.5669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.7134" x="1178.5" y="190.6997">- A Project can be assigned to multiple Teams.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.6606" x="1178.5" y="205.8325">- Project completion prevents new Issues.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="467.7969" x="1178.5" y="220.9653">- Due date-time can be null for backlog projects and is timezone-aware.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.1592" x="1178.5" y="236.0981">- Project-level roles are managed by RoleDefinition catalog.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="332.2808" x="1178.5" y="251.231">- A project role can have single or multiple owners.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="439.4038" x="1178.5" y="266.3638">- Project role owners must belong to teams assigned to the project.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="482.1743" x="1178.5" y="281.4966">- Team and member contribution metrics are captured in daily snapshots.</text></g><!--reverse link Project to ProjectTeam--><g class="link" data