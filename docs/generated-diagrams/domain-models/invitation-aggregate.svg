" cy="366.4246" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.4199" x="42" y="370.2156">revoke(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="33" cy="382.9129" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.8359" x="42" y="386.7039">expire(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="33" cy="399.4012" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="235.9971" x="42" y="403.1922">isExpired(now: DateTime): Boolean</text></g><!--class InvitationStatus--><g class="entity" data-qualified-name="Invitation Aggregate.InvitationStatus" data-source-line="22" id="ent0004"><rect fill="#F1F1F1" height="113.9531" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="137.123" x="319.44" y="201.2"/><ellipse cx="334.44" cy="217.2" fill="#EB937F" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M338.0543,223.7 L330.3345,223.7 L330.3345,211.3069 L338.0543,211.3069 L338.0543,213.4651 L332.7833,213.4651 L332.7833,216.138 L337.5562,216.138 L337.5562,218.2962 L332.7833,218.2962 L332.7833,221.5418 L338.0543,221.5418 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="105.123" x="348.44" y="222.491">InvitationStatus</text><line style="stroke:#181818;stroke-width:0.5;" x1="320.44" x2="455.563" y1="233.2" y2="233.2"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55.5762" x="325.44" y="250.7352">pending</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5322" x="325.44" y="267.2234">accepted</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51.584" x="325.44" y="283.7117">expired</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="54.168" x="325.44" y="300.2">revoked</text><line style="stroke:#181818;stroke-width:0.5;" x1="320.44" x2="455.563" y1="307.1531" y2="307.1531"/></g><g class="entity" data-qualified-name="GMN5" data-source-line="31" id="ent0006"><path d="M491.74,191.94 L491.74,324.4244 L998.2595,324.4244 L998.2595,201.94 L988.2595,191.94 L491.74,191.94" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M988.2595,191.94 L988.2595,201.94 L998.2595,201.94 L988.2595,191.94" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91.0063" x="497.74" y="209.5084">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.5542" x="497.74" y="224.8189">- Invitation target is Team only.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="427.5972" x="497.74" y="240.1295">- Invitee can accept only once per invitation and only before expiry.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="485.5195" x="497.74" y="255.44">- Re-invite is allowed; only one pending invitation per (teamId, inviteeEmail).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="284.0386" x="497.74" y="270.7505">- Token must be unique and non-guessable.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.9214" x="497.74" y="286.0611">- Only pending invitations can be revoked.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276.2627" x="497.74" y="301.3716">- `accepted` status requires `acceptedAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4434" x="497.74" y="316.6822">- `revoked` status requires `revokedAt`.</text></g><!--link TeamInvitation to GMN5--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="association" data-source-line="31" id="lnk7"><path d="M235.05,105.85 C258.27,76.58 286.41,49.88 319.5,33.2 C373.48,6 398.32,13.6 455.5,33.2 C546.57,64.43 631.08,137.29 685,191.69" fill="none" id="TeamInvitation-GMN5" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><?plantuml-src RLBBRi8m4BpdArQSG6tw0IcYee83fqeyxfXacbeaTh0TQ5Nrt-j7GW8aXoZnpCwETwTYwP7beD5AdBbXXaj1ypnNo9d1Y7wZY2WjcDQq1IjxfEdqIgErb6OsisIopnFF4jhjLelmPrpPpGbt8b0x3JK4O5aoNYIqCOgBl16HHuZR8srzr3gXpjB6dmGKtnLNq7EJqC8wtF8I0M1fYieWwoDl0L8uspP3IAh0xceYZyHnNtKivALZJFggWr0mEGXnlVHWTeScz2vb0IOixSzvWAZBXnaqcwWWidPUxRtzJsWSlfjRUpshAAJTf-Bvbo7vURVpQ27jQWIjwm8wYU9UNp9CvJ34Gqv8YkBdfMK0b3BHMF2GVQMm_XJnJeA9B807V4g5uDAhh167R3XzLXJoWkor5K9xpxwManw7w3rJFrSJfxTrSQAoriRsebhmKmtVNaWHvpMqPeS2ZldXUZpgQtyXMzjCpr7txOZt5B9fmLFjKjX1SxFtrAPiW7aDeIN2EpA8_W40?></g></svg>