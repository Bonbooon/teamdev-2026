visibility-modifier="PUBLIC_METHOD"><ellipse cx="211.5" cy="298.4766" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.0742" x="220.5" y="301.8232">revoke(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="211.5" cy="314.7734" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.1777" x="220.5" y="318.1201">expire(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="211.5" cy="331.0703" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="247.3379" x="220.5" y="334.417">isExpired(now: DateTime): Boolean</text></g><!--class InvitationStatus--><g class="entity" data-qualified-name="Invitation Aggregate.InvitationStatus" data-source-line="22" id="ent0004"><rect fill="#F1F1F1" height="113.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="142.6738" x="22.5" y="135"/><ellipse cx="37.5" cy="151" fill="#EB937F" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M41.6094,157 L33.8906,157 L33.8906,144.6094 L41.6094,144.6094 L41.6094,146.7656 L36.3438,146.7656 L36.3438,149.4375 L41.1094,149.4375 L41.1094,151.5938 L36.3438,151.5938 L36.3438,154.8438 L41.6094,154.8438 L41.6094,157 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.6738" x="51.5" y="155.8467">InvitationStatus</text><line style="stroke:#181818;stroke-width:0.5;" x1="23.5" x2="164.1738" y1="167" y2="167"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56.9092" x="28.5" y="183.9951">pending</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.4629" x="28.5" y="200.292">accepted</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="52.9307" x="28.5" y="216.5889">expired</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56.8271" x="28.5" y="232.8857">revoked</text><line style="stroke:#181818;stroke-width:0.5;" x1="23.5" x2="164.1738" y1="240.1875" y2="240.1875"/></g><g class="entity" data-qualified-name="GMN5" data-source-line="31" id="ent0006"><path d="M509,126 L509,187.5 L473.58,191.5 L509,195.5 L509,257.0625 A0,0 0 0 0 509,257.0625 L1030.5635,257.0625 A0,0 0 0 0 1030.5635,257.0625 L1030.5635,136 L1020.5635,126 L509,126 A0,0 0 0 0 509,126" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1020.5635,126 L1020.5635,136 L1030.5635,136 L1020.5635,126" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="515" y="143.0669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.0356" x="515" y="158.1997">- Invitation target is Team only.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="441.9365" x="515" y="173.3325">- Invitee can accept only once per invitation and only before expiry.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="500.5635" x="515" y="188.4653">- Re-invite is allowed; only one pending invitation per (teamId, inviteeEmail).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.3237" x="515" y="203.5981">- Token must be unique and non-guessable.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276.5039" x="515" y="218.731">- Only pending invitations can be revoked.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.5669" x="515" y="233.8638">- `accepted` status requires `acceptedAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.3862" x="515" y="248.9966">- `revoked` status requires `revokedAt`.</text></g><?plantuml-src RLBBRi8m4BpdArQSG6tw0IcYee83fqeyxfXacbeaTh0TQ5Nrt-j7GW8aXoZnpCwETwTYwP7beD5AdBbXXaj1ypnNo9d1Y7wZY2WjcDQq1IjxfEdqIgErb6OsisIopnFF4jhjLelmPrpPpGbt8b0x3JK4O5aoNYIqCOgBl16HHuZR8srzr3gXpjB6dmGKtnLNq7EJqC8wtF8I0M1fYieWwoDl0L8uspP3IAh0xceYZyHnNtKivALZJFggWr0mEGXnlVHWTeScz2vb0IOixSzvWAZBXnaqcwWWidPUxRtzJsWSlfjRUpshAAJTf-Bvbo7vURVpQ27jQWIjwm8wYU9UNp9CvJ34Gqv8YkBdfMK0b3BHMF2GVQMm_XJnJeA9B807V4g5uDAhh167R3XzLXJoWkor5K9xpxwManw7w3rJFrSJfxTrSQAoriRsebhmKmtVNaWHvpMqPeS2ZldXUZpgQtyXMzjCpr7txOZt5B9fmLFjKjX1SxFtrAPiW7aDeIN2EpA8_W40?></g></svg>