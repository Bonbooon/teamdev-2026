 x="42.33" y="351.2364">accept(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="33.33" cy="364.1866" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.0742" x="42.33" y="367.5332">revoke(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="33.33" cy="380.4834" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.1777" x="42.33" y="383.8301">expire(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="33.33" cy="396.7803" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="247.3379" x="42.33" y="400.127">isExpired(now: DateTime): Boolean</text></g><!--class InvitationStatus--><g class="entity" data-qualified-name="Invitation Aggregate.InvitationStatus" data-source-line="22" id="ent0004"><rect fill="#F1F1F1" height="113.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="142.6738" x="330.66" y="200.48"/><ellipse cx="345.66" cy="216.48" fill="#EB937F" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M349.7694,222.48 L342.0506,222.48 L342.0506,210.0894 L349.7694,210.0894 L349.7694,212.2456 L344.5038,212.2456 L344.5038,214.9175 L349.2694,214.9175 L349.2694,217.0738 L344.5038,217.0738 L344.5038,220.3238 L349.7694,220.3238 L349.7694,222.48 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.6738" x="359.66" y="221.3267">InvitationStatus</text><line style="stroke:#181818;stroke-width:0.5;" x1="331.66" x2="472.3338" y1="232.48" y2="232.48"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56.9092" x="336.66" y="249.4751">pending</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.4629" x="336.66" y="265.772">accepted</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="52.9307" x="336.66" y="282.0689">expired</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56.8271" x="336.66" y="298.3657">revoked</text><line style="stroke:#181818;stroke-width:0.5;" x1="331.66" x2="472.3338" y1="305.6675" y2="305.6675"/></g><g class="entity" data-qualified-name="GMN5" data-source-line="31" id="ent0006"><path d="M508.22,191.54 L508.22,322.6025 L1029.7835,322.6025 L1029.7835,201.54 L1019.7835,191.54 L508.22,191.54" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1019.7835,191.54 L1019.7835,201.54 L1029.7835,201.54 L1019.7835,191.54" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="514.22" y="208.6069">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.0356" x="514.22" y="223.7397">- Invitation target is Team only.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="441.9365" x="514.22" y="238.8725">- Invitee can accept only once per invitation and only before expiry.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="500.5635" x="514.22" y="254.0053">- Re-invite is allowed; only one pending invitation per (teamId, inviteeEmail).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.3237" x="514.22" y="269.1381">- Token must be unique and non-guessable.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276.5039" x="514.22" y="284.271">- Only pending invitations can be revoked.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.5669" x="514.22" y="299.4038">- `accepted` status requires `acceptedAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.3862" x="514.22" y="314.5366">- `revoked` status requires `revokedAt`.</text></g><!--link TeamInvitation to GMN5--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="association" data-source-line="31" id="lnk7"><path d="M244,106.3 C267.95,77.02 296.84,50.3 330.5,33.71 C386.71,6 412.05,13.88 471.5,33.71 C564.32,64.68 651.47,137.22 707.15,191.28" fill="none" id="TeamInvitation-GMN5" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><?plantuml-src RLBBRi8m4BpdArQSG6tw0IcYee83fqeyxfXacbeaTh0TQ5Nrt-j7GW8aXoZnpCwETwTYwP7beD5AdBbXXaj1ypnNo9d1Y7wZY2WjcDQq1IjxfEdqIgErb6OsisIopnFF4jhjLelmPrpPpGbt8b0x3JK4O5aoNYIqCOgBl16HHuZR8srzr3gXpjB6dmGKtnLNq7EJqC8wtF8I0M1fYieWwoDl0L8uspP3IAh0xceYZyHnNtKivALZJFggWr0mEGXnlVHWTeScz2vb0IOixSzvWAZBXnaqcwWWidPUxRtzJsWSlfjRUpshAAJTf-Bvbo7vURVpQ27jQWIjwm8wYU9UNp9CvJ34Gqv8YkBdfMK0b3BHMF2GVQMm_XJnJeA9B807V4g5uDAhh167R3XzLXJoWkor5K9xpxwManw7w3rJFrSJfxTrSQAoriRsebhmKmtVNaWHvpMqPeS2ZldXUZpgQtyXMzjCpr7txOZt5B9fmLFjKjX1SxFtrAPiW7aDeIN2EpA8_W40?></g></svg>