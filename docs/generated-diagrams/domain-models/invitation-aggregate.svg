" y2="284.8281"/><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="211.5" cy="298.4766" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="164.0967" x="220.5" y="301.8232">accept(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="211.5" cy="314.7734" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.0742" x="220.5" y="318.1201">revoke(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="211.5" cy="331.0703" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.1777" x="220.5" y="334.417">expire(now: DateTime)</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="211.5" cy="347.3672" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="247.3379" x="220.5" y="350.7139">isExpired(now: DateTime): Boolean</text></g><!--class InvitationStatus--><g class="entity" data-qualified-name="Invitation Aggregate.InvitationStatus" data-source-line="23" id="ent0004"><rect fill="#F1F1F1" height="113.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="142.6738" x="22.5" y="143"/><ellipse cx="37.5" cy="159" fill="#EB937F" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M41.6094,165 L33.8906,165 L33.8906,152.6094 L41.6094,152.6094 L41.6094,154.7656 L36.3438,154.7656 L36.3438,157.4375 L41.1094,157.4375 L41.1094,159.5938 L36.3438,159.5938 L36.3438,162.8438 L41.6094,162.8438 L41.6094,165 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.6738" x="51.5" y="163.8467">InvitationStatus</text><line style="stroke:#181818;stroke-width:0.5;" x1="23.5" x2="164.1738" y1="175" y2="175"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56.9092" x="28.5" y="191.9951">pending</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.4629" x="28.5" y="208.292">accepted</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="52.9307" x="28.5" y="224.5889">expired</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56.8271" x="28.5" y="240.8857">revoked</text><line style="stroke:#181818;stroke-width:0.5;" x1="23.5" x2="164.1738" y1="248.1875" y2="248.1875"/></g><g class="entity" data-qualified-name="GMN5" data-source-line="32" id="ent0006"><path d="M583,134 L583,195.5 L547.96,199.5 L583,203.5 L583,265.0625 A0,0 0 0 0 583,265.0625 L1104.5635,265.0625 A0,0 0 0 0 1104.5635,265.0625 L1104.5635,144 L1094.5635,134 L583,134 A0,0 0 0 0 583,134" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1094.5635,134 L1094.5635,144 L1104.5635,144 L1094.5635,134" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.6118" x="589" y="151.0669">Domain Rules:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.0356" x="589" y="166.1997">- Invitation target is Team only.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="441.9365" x="589" y="181.3325">- Invitee can accept only once per invitation and only before expiry.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="500.5635" x="589" y="196.4653">- Re-invite is allowed; only one pending invitation per (teamId, inviteeEmail).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.3237" x="589" y="211.5981">- Token must be unique and non-guessable.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276.5039" x="589" y="226.731">- Only pending invitations can be revoked.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.5669" x="589" y="241.8638">- `accepted` status requires `acceptedAt`.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.3862" x="589" y="256.9966">- `revoked` status requires `revokedAt`.</text></g><?plantuml-src RLBBJiCm4BpdArQSg21yG42WelRG0mBrSQ-R3C4YiOFjj234lxEs4vgMv135cTcPtVKq8dyN9UXYeVRI2IUrecbP6fJ2uOA-auGehuIrj8Qe1wIxkpyQBRLsz_TC9dwkP97HPhEOnPFpPIT_f1U1sLYOCG3pMiWgevKpKfKHQM1gQItxBdM5BFJoX7e7ytA2T9Rw7UfKm7BNhSteEC0g_8aeFXjfOASkendFivPrfoJo78r3CKGU8cImPvin93SGPpL9GD9qg7gfzE78c0nLHw7Ov2WaxJo0nHcQqQFchGZ5j1_V0rHR_zj1TsyDLD7lgvyx7A9n_Ewc3dgig3JVlf7bcoFzUfQGPARv8XKjsmesIzA1BpbXIZYICLMaLVLrqpC0oeNgMWWGlt9mVuRaKKAe8e8xl6g3s6LGMIADIVBweghq0SLjBuH-pg6MbxwCGRscOGedNc_juqHrQnrxKQlaHujWhxHAonRMYbq5ptps7l_rRHY8QxljUUgsN_6MOZOP_6Xz2e_Gr6q3jIiROVw5a8a87Jaalm00?></g></svg>